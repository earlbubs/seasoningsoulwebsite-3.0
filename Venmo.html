<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay with Venmo - Seasoning Soul</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            text-align: center;
        }

        .navbar {
            background-color: #000;
            padding: 15px;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #eee;
        }

        .total-box {
            background: #f0faff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #cceeff;
        }

        .total-amount {
            font-size: 2.2rem;
            font-weight: bold;
            color: #008CFF;
        }

        .venmo-display {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .venmo-handle {
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .copy-btn {
            background: #008CFF;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .instructions {
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
        }

        .qr-area {
            width: 220px;
            height: 220px;
            margin: 25px auto;
            border: 2px solid #008CFF;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .confirm-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
        }

        .footer-info {
            font-size: 0.75rem;
            color: #999;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="navbar">SEASONING SOUL</div>

    <div class="payment-container">
        <h2 style="margin-top: 0;">Checkout</h2>
        
        <div class="total-box">
            <p style="margin:0; font-size: 0.8rem; color: #666;">SEND TOTAL TO VENMO:</p>
            <div class="total-amount">$<span id="final-total">0.00</span></div>
        </div>

        <div class="instructions">
            <strong>1. Pay via Venmo:</strong>
            <div class="venmo-display">
                <span class="venmo-handle" id="handle">@seasoningsoul</span>
                <button class="copy-btn" onclick="copyHandle()">Copy</button>
            </div>
            
            <div class="qr-area">
                <img src="qr-code.png" alt="Venmo QR Code" style="width:90%; height:auto;">
            </div>

            <strong>2. Add Note:</strong>
            <p style="margin-top: 5px;">Please include your <b>Full Name</b> in the Venmo note so we can match your payment to your order.</p>
        </div>

        <button class="confirm-btn" onclick="completeOrder()">I have sent payment</button>

        <div class="footer-info">
            Payments are manually verified.<br>
            Shipping happens every Saturday.
        </div>
    </div>

    <script>
        function loadTotal() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('final-total').innerText = total.toFixed(2);
        }

        function copyHandle() {
            const handle = document.getElementById('handle').innerText;
            navigator.clipboard.writeText(handle);
            alert("Username copied to clipboard!");
        }

        function completeOrder() {
            alert("Thanks! We'll check our Venmo for @seasoningsoul and get your gear ready for Saturday shipping.");
            localStorage.removeItem('cart');
            window.location.href = "index.html"; 
        }

        loadTotal();
    </script>
</body>
</html>
