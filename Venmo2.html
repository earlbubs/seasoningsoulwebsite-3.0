<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Seasoning Soul</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            text-align: center;
            color: #333;
        }

        .navbar {
            background-color: #000;
            padding: 15px;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .checkout-container {
            max-width: 500px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #eee;
            text-align: left;
        }

        .total-box {
            background: #f0faff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #cceeff;
            text-align: center;
        }

        .total-amount {
            font-size: 2.2rem;
            font-weight: bold;
            color: #000;
        }

        /* --- Tabs for Payment Method --- */
        .payment-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #999;
        }

        .tab.active {
            color: #000;
            border-bottom: 2px solid #000;
        }

        .payment-section { display: none; }
        .payment-section.active { display: block; }

        /* --- Card Form Styling --- */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .row { display: flex; gap: 10px; }

        /* --- Venmo Styles --- */
        .venmo-display {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .venmo-handle { font-family: monospace; font-size: 1.2rem; font-weight: bold; }

        .qr-area {
            width: 180px;
            height: 180px;
            margin: 20px auto;
            border: 2px solid #008CFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confirm-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer-info {
            font-size: 0.75rem;
            color: #999;
            margin-top: 25px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="navbar">SEASONING SOUL</div>

    <div class="checkout-container">
        <h2 style="margin-top: 0; text-align: center;">Checkout</h2>
        
        <div class="total-box">
            <p style="margin:0; font-size: 0.8rem; color: #666;">ORDER TOTAL:</p>
            <div class="total-amount">$<span id="final-total">0.00</span></div>
        </div>

        <div class="payment-tabs">
            <div class="tab active" id="tab-card" onclick="switchTab('card')">Debit/Credit</div>
            <div class="tab" id="tab-venmo" onclick="switchTab('venmo')">Venmo</div>
        </div>

        <div id="section-card" class="payment-section active">
            <div class="input-group">
                <label>Cardholder Name</label>
                <input type="text" placeholder="Full Name">
            </div>
            <div class="input-group">
                <label>Card Number</label>
                <input type="text" placeholder="0000 0000 0000 0000">
            </div>
            <div class="row">
                <div class="input-group" style="flex: 2;">
                    <label>Expiration</label>
                    <input type="text" placeholder="MM / YY">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>CVV</label>
                    <input type="text" placeholder="123">
                </div>
            </div>
            <button class="confirm-btn" onclick="completeOrder('Card')">Pay with Card</button>
        </div>

        <div id="section-venmo" class="payment-section">
            <div class="venmo-display">
                <span class="venmo-handle">@seasoningsoul</span>
            </div>
            <div class="qr-area">
                <img src="qr-code.png" alt="Venmo QR" style="width:90%;">
            </div>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">
                Include your <b>Full Name</b> in the Venmo note so we can verify your order.
            </p>
            <button class="confirm-btn" onclick="completeOrder('Venmo')">I have sent payment</button>
        </div>

        <div class="footer-info">
            Shipping happens every Saturday. <br>
            Secure checkout for Seasoning Soul.
        </div>
    </div>

    <script>
        function loadTotal() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('final-total').innerText = total.toFixed(2);
        }

        function switchTab(type) {
            // Update Tabs
            document.getElementById('tab-card').classList.remove('active');
            document.getElementById('tab-venmo').classList.remove('active');
            document.getElementById('tab-' + type).classList.add('active');

            // Update Sections
            document.getElementById('section-card').classList.remove('active');
            document.getElementById('section-venmo').classList.remove('active');
            document.getElementById('section-' + type).classList.add('active');
        }

        function completeOrder(method) {
            alert("Order received via " + method + "! We will process your order for Saturday shipping.");
            localStorage.removeItem('cart');
            window.location.href = "index.html"; 
        }

        loadTotal();
    </script>
</body>
</html>
