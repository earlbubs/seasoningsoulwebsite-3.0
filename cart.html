<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Seasoning Soul</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: #000;
            color: #fff;
        }

        .navbar a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        .cart-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border: 1px solid #eee;
        }

        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 30px; }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .item-details { display: flex; flex-direction: column; gap: 5px; }
        .item-name { font-weight: bold; font-size: 1.1rem; }
        .item-meta { font-size: 0.85rem; color: #777; text-transform: uppercase; }

        .item-price { font-weight: bold; }

        .remove-btn {
            background: none;
            border: none;
            color: #e33;
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 5px;
            padding: 0;
        }

        .cart-summary {
            margin-top: 30px;
            text-align: right;
        }

        .summary-row {
            font-size: 1rem;
            margin-bottom: 5px;
            color: #555;
        }

        .total-row {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #000;
        }

        .checkout-btn {
            background: #000;
            color: #fff;
            padding: 15px 40px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
        }

        .empty-msg {
            text-align: center;
            padding: 50px 0;
            color: #999;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #000;
            font-size: 0.8rem;
            font-weight: bold;
        }

        footer { text-align: center; padding: 40px; font-size: 0.75rem; color: #aaa; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="/">SEASONING SOUL</a></div>
        <div><a href="/">CONTINUE SHOPPING</a></div>
    </nav>

    <main class="cart-container">
        <h1>YOUR CART</h1>
        
        <div id="cart-items-list"></div>

        <div id="cart-empty-view" class="empty-msg" style="display: none;">
            Your cart is currently empty.
            <br>
            <a href="/" class="back-link">← GO BACK TO SHOP</a>
        </div>

        <div id="cart-summary-view" class="cart-summary">
            <div class="summary-row">
                SUBTOTAL: $<span id="cart-subtotal">0.00</span>
            </div>
            <div class="summary-row">
                ESTIMATED TAX (9.5%): $<span id="cart-tax">0.00</span>
            </div>
            <hr style="border: 0; border-top: 1px solid #eee; width: 30%; margin-left: auto;">
            <div class="total-row">
                TOTAL: $<span id="cart-total">0.00</span>
            </div>
            <button class="checkout-btn" onclick="alert('Checkout process starting...')">PROCEED TO CHECKOUT</button>
        </div>
    </main>

    <footer>
        <p>&copy; Seasoning Soul 2026 | Created by Jamison Boykin</p>
    </footer>

    <script>
        function renderCart() {
            const listContainer = document.getElementById('cart-items-list');
            const summaryView = document.getElementById('cart-summary-view');
            const emptyView = document.getElementById('cart-empty-view');
            
            const subtotalDisplay = document.getElementById('cart-subtotal');
            const taxDisplay = document.getElementById('cart-tax');
            const totalDisplay = document.getElementById('cart-total');
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            if (cart.length === 0) {
                listContainer.innerHTML = '';
                summaryView.style.display = 'none';
                emptyView.style.display = 'block';
                return;
            }

            emptyView.style.display = 'none';
            summaryView.style.display = 'block';
