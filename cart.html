<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Seasoning Soul</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cart-wrapper">
        <div class="cart-container">
            <div class="cart-items">
                <h2>Your Kitchen Stash</h2>
                <div class="item">
                    <img src="product-placeholder.jpg" alt="Seasoning">
                    <div class="item-details">
                        <h3>Signature Soul Blend</h3>
                        <p>8oz Jar</p>
                    </div>
                    <div class="quantity">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                    <p class="price">$12.99</p>
                </div>
            </div>

            <div class="cart-summary">
                <h2>Summary</h2>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$12.99</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>$12.99</span>
                </div>
                <button class="checkout-btn">Checkout Now</button>
                <a href="#" class="continue-shopping">Keep Shopping</a>
            </div>
        </div>
    </div>
</body>
</html>
