
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      padding:40px;
    }

    .cart-container{
      max-width:1000px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:25px;
      text-align:center;
    }

    .cart-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:20px 0;
      border-bottom:1px solid #ddd;
      gap:20px;
    }

    .cart-item img{
      width:100px;
      height:100px;
      object-fit:cover;
      border-radius:10px;
    }

    .item-info{
      flex:1;
    }

    .item-info h2{
      font-size:20px;
      margin-bottom:10px;
    }

    .price{
      color:green;
      font-weight:bold;
      font-size:18px;
    }

    .quantity{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .quantity button{
      width:30px;
      height:30px;
      border:none;
      background:black;
      color:white;
      font-size:18px;
      border-radius:5px;
      cursor:pointer;
    }

    .remove-btn{
      background:red;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      cursor:pointer;
    }

    .remove-btn:hover{
      opacity:0.8;
    }

    .cart-summary{
      margin-top:30px;
      text-align:right;
    }

    .total{
      font-size:28px;
      margin-bottom:20px;
    }

    .checkout-btn{
      background:#007bff;
      color:white;
      border:none;
      padding:15px 30px;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
      margin-right:10px;
    }

    .delete-all-btn{
      background:darkred;
      color:white;
      border:none;
      padding:15px 30px;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
    }

    .empty-message{
      text-align:center;
      font-size:24px;
      padding:40px 0;
      color:gray;
      display:none;
    }

    @media(max-width:700px){
      .cart-item{
        flex-direction:column;
        align-items:flex-start;
      }

      .cart-summary{
        text-align:left;
      }
    }
  </style>
</head>

<body>

  <div class="cart-container">

    <h1>Your Cart</h1>

    <div id="cart-items">

      <div class="cart-item" data-price="49.99">
        <img src="https://via.placeholder.com/100" alt="Product">

        <div class="item-info">
          <h2>Cool Hoodie</h2>
          <p class="price">$49.99</p>
        </div>

        <div class="quantity">
          <button onclick="changeQty(this, -1)">-</button>
          <span class="qty">1</span>
          <button onclick="changeQty(this, 1)">+</button>
        </div>

        <button class="remove-btn" onclick="removeItem(this)">
          Remove
        </button>
      </div>

    </div>

    <div class="empty-message" id="emptyMessage">
      Your cart is empty.
    </div>

    <div class="cart-summary">
      <div class="total">
        Total: $<span id="total">49.99</span>
      </div>

      <button class="checkout-btn">
        Proceed to Checkout
      </button>

      <button class="delete-all-btn" onclick="deleteAll()">
        Delete All
      </button>
    </div>

  </div>

  <script>

    function changeQty(button, amount){

      const cartItem = button.closest(".cart-item");
      const qtyElement = cartItem.querySelector(".qty");

      let quantity = parseInt(qtyElement.innerText);

      quantity += amount;

      if(quantity < 1){
        quantity = 1;
      }

      qtyElement.innerText = quantity;

      updateTotal();
    }

    function removeItem(button){

      const cartItem = button.closest(".cart-item");

      cartItem.remove();

      updateTotal();
      checkIfEmpty();
    }

    function deleteAll(){

      document.getElementById("cart-items").innerHTML = "";

      updateTotal();
      checkIfEmpty();
    }

    function updateTotal(){

      const items = document.querySelectorAll(".cart-item");

      let total = 0;

      items.forEach(item => {

        const price = parseFloat(item.dataset.price);
        const quantity = parseInt(item.querySelector(".qty").innerText);

        total += price * quantity;
      });

      document.getElementById("total").innerText = total.toFixed(2);
    }

    function checkIfEmpty(){

      const items = document.querySelectorAll(".cart-item");

      if(items.length === 0){
        document.getElementById("emptyMessage").style.display = "block";
      } else {
        document.getElementById("emptyMessage").style.display = "none";
      }
    }

  </script>

</body>
</html>
