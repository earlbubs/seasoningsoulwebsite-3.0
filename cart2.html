<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-font: 'Lacquer', system-ui;
            --body-font: 'Inter', sans-serif;
            --accent-color: #ff3e3e;
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
        }

        body {
            font-family: var(--body-font);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
        }

        .cart-container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: var(--primary-font);
            font-size: 3rem;
            text-align: center;
            margin-bottom: 40px;
            color: var(--accent-color);
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .item-details { flex-grow: 1; }

        .item-name {
            font-family: var(--primary-font);
            font-size: 1.5rem;
            margin: 0;
        }

        .remove-btn {
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 8px 16px;
            cursor: pointer;
            font-family: var(--primary-font);
            border-radius: 4px;
        }

        .cart-summary {
            margin-top: 30px;
            text-align: right;
            padding: 20px;
            border-top: 2px solid #444;
        }

        .total-display {
            font-family: var(--primary-font);
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .checkout-btn {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-family: var(--primary-font);
            font-size: 1.8rem;
            cursor: pointer;
            width: 100%;
        }

        .empty-msg {
            text-align: center;
            font-family: var(--primary-font);
            opacity: 0.5;
            font-size: 1.5rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<div class="cart-container">
    <h1>Your Bag</h1>
    <div id="cart-items-wrapper"></div>
    
    <div class="cart-summary">
        <div id="total-price" class="total-display">Total: $0.00</div>
        <button class="checkout-btn" id="checkout-btn">CHECKOUT</button>
    </div>
</div>

<script>
    const wrapper = document.getElementById('cart-items-wrapper');
    const totalDisplay = document.getElementById('total-price');

    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('myCart')) || [];
        wrapper.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            wrapper.innerHTML = '<div class="empty-msg">CART IS EMPTY</div>';
            document.getElementById('checkout-btn').style.display = 'none';
            totalDisplay.innerHTML = '';
            return;
        }

        cart.forEach((item, index) => {
            total += item.price;
            wrapper.innerHTML += `
                <div class="cart-item">
                    <div class="item-details">
                        <p class="item-name">${item.name}</p>
                        <p>$${item.price.toFixed(2)}</p>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">REMOVE</button>
                </div>
            `;
        });

        totalDisplay.innerHTML = `Total: $${total.toFixed(2)}`;
        document.getElementById('checkout-btn').style.display = 'block';
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('myCart'));
        cart.splice(index, 1); // Remove the item from array
        localStorage.setItem('myCart', JSON.stringify(cart));
        renderCart(); // Refresh the page list
    }

    // Run on load
    renderCart();
</script>

</body>
</html>
