<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-font: 'Lacquer', system-ui;
            --body-font: 'Inter', sans-serif;
            --accent-color: #ff3e3e;
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
        }

        body {
            font-family: var(--body-font);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
        }

        .cart-container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: var(--primary-font);
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-align: center;
            margin-bottom: 40px;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        /* Container for items added via JavaScript */
        #cart-items-list {
            margin-bottom: 20px;
        }

        .empty-msg {
            text-align: center;
            font-family: var(--primary-font);
            font-size: 1.5rem;
            opacity: 0.6;
            padding: 50px 0;
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #444;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-details {
            flex-grow: 1;
        }

        .item-name {
            font-family: var(--primary-font);
            font-size: 1.5rem;
            margin: 0;
        }

        .remove-btn {
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 8px 16px;
            cursor: pointer;
            font-family: var(--primary-font);
            transition: all 0.2s;
            border-radius: 4px;
        }

        .remove-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        .cart-summary {
            margin-top: 30px;
            text-align: right;
            padding: 20px;
            border-top: 2px solid #444;
        }

        .checkout-btn {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-family: var(--primary-font);
            font-size: 1.8rem;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .checkout-btn:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        .checkout-btn:not(:disabled):hover {
            background-color: var(--accent-color);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="cart-container">
        <h1>Shopping Bag</h1>

        <div id="cart-items-list">
            <div class="empty-msg">YOUR BAG IS CURRENTLY EMPTY</div>
        </div>

        <div class="cart-summary">
            <button id="checkout-btn" class="checkout-btn" disabled>
                CHECKOUT
            </button>
        </div>
    </div>

    <script>
        // Simple function to remove an item (logic for your dev team)
        document.addEventListener('click', function(e) {
            if(e.target && e.target.classList.contains('remove-btn')) {
                const item = e.target.closest('.cart-item');
                item.style.opacity = '0';
                setTimeout(() => {
                    item.remove();
                    checkEmpty();
                }, 200);
            }
        });

        function checkEmpty() {
            const list = document.getElementById('cart-items-list');
            const checkout = document.getElementById('checkout-btn');
            if (list.children.length === 0) {
                list.innerHTML = '<div class="empty-msg">YOUR BAG IS CURRENTLY EMPTY</div>';
                checkout.disabled = true;
            }
        }
    </script>
</body>
</html>
