<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Seasoning Soul</title>
    
    <style>
        /* CSS STYLES */
        :root {
            --primary: #222;
            --accent: #e67e22; 
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            background-color: #fff;
        }

        .navbar {
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
        }

        .logo a {
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: white;
            text-decoration: none;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .checkout-grid { grid-template-columns: 1fr; }
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .checkout-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .checkout-btn:hover {
            background: #d35400;
        }

        .summary-section {
            background: var(--light);
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: var(--light);
            margin-top: 50px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo"><a href="#">SEASONING SOUL</a></div>
        </div>
        <ul class="nav-menu">
            <li><a href="#">MEN'S</a></li>
            <li><a href="#">WOMEN'S</a></li>
            <li><a href="#">KIDS</a></li>
            <li><a href="#">ABOUT</a></li>
        </ul>
        <div class="cart-icon">
            <a href="#" style="text-decoration: none; color: white;">🛒 <span id="cart-count">0</span></a>
        </div>
    </nav>

    <main class="container">
        <h1>CHECKOUT</h1>
        
        <div class="checkout-grid">
            <section class="form-section">
                <h3>Shipping Information</h3>
                <form id="checkout-form">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="text" placeholder="Shipping Address" required>
                    <div class="form-row">
                        <input type="text" placeholder="City" required>
                        <input type="text" placeholder="Zip Code" required>
                    </div>
                    <button type="submit" class="checkout-btn">Complete Purchase</button>
                </form>
            </section>

            <aside class="summary-section">
                <h3>Order Summary</h3>
                <div id="cart-items">
                    <p>Your cart is empty.</p>
                </div>
                <hr>
                <div class="cart-item">
                    <strong>Total:</strong>
                    <span id="total-price" style="font-weight: bold;">$0.00</span>
                </div>
            </aside>
        </div>
    </main>

    <footer>
        <p>Copyright Seasoning Soul 2026</p>
        <p>Website created by Jamison Boykin.</p>
        <p>Locally Owned and Operated by Earl Twigg. EST. 2026</p>
    </footer>

    <script>
        // 1. Setup sample data
        const cartData = [
            { id: 1, name: "Soul Seasoning Rub", price: 12.99 },
            { id: 2, name: "Spicy Garlic Blend", price: 8.50 },
            { id: 3, name: "Hickory Smoke Salt", price: 10.00 }
        ];

        // 2. Function to display the items
        function updateCheckoutPage() {
            const container = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('total-price');
            const countDisplay = document.getElementById('cart-count');
            
            let total = 0;
            container.innerHTML = ''; // Clear the "empty" message

            cartData.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <span>${item.name}</span>
                    <span>$${item.price.toFixed(2)}</span>
                `;
                container.appendChild(itemDiv);
                total += item.price;
            });

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            countDisplay.innerText = cartData.length;
        }

        // 3. Handle the form click
        document.getElementById('checkout-form').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Order Received! Jamison and Earl are on it.');
        });

        // Run the update when the page loads
        window.onload = updateCheckoutPage;
    </script>

</body>
</html>
