<link href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap" rel="stylesheet">

<style>
  /* 2. Set the background to black */
  body {
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* 3. Style the button */
  .lacquer-btn {
    font-family: 'Lacquer', system-ui; /* Use the Lacquer font */
    background-color: #ffffff;        /* White button */
    color: #000000;                 /* Black text */
    padding: 15px 30px;
    border: none;
    border-radius: 8px;
    font-size: 24px;
    cursor: pointer;
    transition: 0.2s;
  }

  /* Simple hover effect */
  .lacquer-btn:hover {
    background-color: #dddddd;
    transform: scale(1.05);
  }
</style>

<button class="lacquer-btn" onclick="thanks()">
  ADD TO CART
</button>

<script>
  function thanks() {
    alert("Added!");
  }
</script>
