<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Seasoning Soul</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #f9f9f9; }
        .navbar { background: #000; color: #fff; padding: 15px 5%; display: flex; justify-content: space-between; }
        .cart-container { max-width: 800px; margin: 50px auto; background: #fff; padding: 30px; border: 1px solid #eee; }
        .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .item-details h3 { margin: 0; font-size: 1.1rem; }
        .item-details p { margin: 5px 0; color: #666; font-size: 0.9rem; }
        .total-section { margin-top: 20px; text-align: right; font-weight: bold; font-size: 1.5rem; border-top: 2px solid #000; padding-top: 10px; }
        .empty-msg { text-align: center; color: #999; padding: 40px; }
        
        /* Button Container */
        .cart-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; margin-top: 20px; }

        /* Purchase Button Styling */
        .purchase-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            max-width: 300px;
            transition: 0.3s;
        }
        .purchase-btn:hover { background: #333; }

        .clear-btn { background: none; color: #ff4444; border: none; padding: 5px; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
        .back-link { text-decoration: none; color: #000; font-weight: bold; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">SEASONING SOUL</div>
        <a href="index.html" style="color: white; text-decoration: none;">BACK TO SHOP</a>
    </nav>

    <div class="cart-container">
        <a href="index.html" class="back-link">← Continue Shopping</a>
        <h1>Your Shopping Cart</h1>
        
        <div id="cart-items-list"></div>

        <div class="total-section" id="cart-total">
            Total: $0
        </div>

        <div class="cart-actions" id="cart-actions-box">
            <button class="purchase-btn" onclick="processPurchase()">Purchase Now</button>
            <button class="clear-btn" onclick="clearCart()">Empty Cart</button>
        </div>
    </div>

    <script>
        function displayCart() {
            const cartList = document.getElementById('cart-items-list');
            const totalDisplay = document.getElementById('cart-total');
            const actionsBox = document.getElementById('cart-actions-box');
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (cart.length === 0) {
                cartList.innerHTML = '<div class="empty-msg">Your cart is empty.</div>';
                totalDisplay.innerText = "Total: $0";
                actionsBox.style.display = "none";
                return;
            }

            actionsBox.style.display = "flex";
            let html = '';
            let grandTotal = 0;

            cart.forEach((item, index) => {
                let itemTotal = item.price * item.qty;
                grandTotal += itemTotal;
                
                html += `
                    <div class="cart-item">
                        <div class="item-details">
                            <h3>${item.name}</h3>
                            <p>Size: ${item.size} | Color: ${item.color}</p>
                            <p>Quantity: ${item.qty}</p>
                        </div>
                        <div class="item-price">
                            $${itemTotal}
                        </div>
                    </div>
                `;
            });

            cartList.innerHTML = html;
            totalDisplay.innerText = `Total: $${grandTotal}`;
        }

        function clearCart() {
            if(confirm("Are you sure you want to clear your cart?")) {
                localStorage.removeItem('cart');
                displayCart();
            }
        }

        // --- UPDATED FUNCTION ---
        function processPurchase() {
            // 1. Clear the cart data so it doesn't stay there after they leave
            localStorage.removeItem('cart');
            
            // 2. Redirect the user to your Venmo payment page
            window.location.href = "venmo2.html";
        }

        displayCart();
    </script>
</body>
</html>
