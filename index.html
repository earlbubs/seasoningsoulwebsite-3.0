<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Seasoning Soul - Merch Brand</title>
    <style>
        /* Styles for your new shipping banner */
        .shipping-banner {
            background-color: #ff4500; /* A bold orange-red to grab attention */
            color: white;
            text-align: center;
            padding: 10px 0;
            font-family: sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 14px;
            text-transform: uppercase;
            width: 100%;
        }

        /* Basic reset to ensure the banner touches the very top */
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="shipping-banner">
        📦 Orders are processed and shipped on Saturdays only
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">SEASONING SOUL</div>
        </div>
        <ul class="nav-menu">
            <li><a href="/mens">MEN'S</a></li>
            <li><a href="/womens">WOMEN'S</a></li>
            <li><a href="/kids">KIDS</a></li>
            <li><a href="/about">ABOUT</a></li>
        </ul>
        <div class="cart-icon">
            <a href="/checkout">🛒</a>
        </div>
    </nav>

    <canvas id="logoCanvas"></canvas>

    <main>
        <div class="hero-section">
            <div class="hero-content">
                <h1>SEASONING SOUL</h1>
                <p>EST. 2026</p>
            </div>
        </div>

        <section class="all-sizes">
            <h2>ALL SHIRTS</h2>
        </section>
    </main>

    <footer>
        <p>Copyright Seasoning Soul 2026</p>
        <p>Website created by Jamison Boykin.</p>
        <p>Locally Owned and Operated by Earl Twigg. EST. 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
