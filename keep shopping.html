<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Seasoning Soul</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f9f9f9;
            text-align: center;
        }

        .success-container {
            background: white;
            padding: 50px;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 450px;
            border-radius: 8px;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 { 
            margin-bottom: 15px; 
            font-size: 2rem;
            letter-spacing: 1px;
        }
        
        p { 
            color: #666; 
            line-height: 1.6; 
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        .keep-shopping-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 18px 35px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .keep-shopping-btn:hover {
            background: #333;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="icon">📦</div>
        <h1>ORDER RECEIVED</h1>
        <p>Thanks for supporting <strong>Seasoning Soul</strong>! We'll verify your payment and get your gear ready for Saturday shipping.</p>
        
        <a href="index.html" class="keep-shopping-btn">Keep Shopping</a>
    </div>

</body>
</html>
