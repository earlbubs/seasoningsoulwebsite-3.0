<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Collection - Seasoning Soul</title>
    <style>
        /* --- Base Branding --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: #000;
            color: #fff;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-menu a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        .cart-icon { position: relative; text-decoration: none; }
        .cart-badge {
            position: absolute; top: -8px; right: -10px;
            background: #e33; color: #fff; border-radius: 50%;
            padding: 2px 6px; font-size: 0.7rem; display: none;
        }

        /* --- Grid System (Quarter Page Layout) --- */
        .content-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .products-grid {
            display: grid;
            /* Creates 4 columns. If only 2 items exist, they stay on the left. */
            grid-template-columns: repeat(4, 1fr); 
            gap: 25px;
        }

        /* Mobile Responsive: Stack items on small screens */
        @media (max-width: 900px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .products-grid { grid-template-columns: 1fr; }
        }

        /* --- Product Card --- */
        .product-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-image {
            width: 100%;
            height: 280px;
            background-color: #87CEEB; /* Light Blue Branding */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            border-radius: 2px;
        }

        .category-label {
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .product-name { font-size: 1rem; font-weight: bold; margin-bottom: 5px; }
        .product-price { font-size: 1rem; color: #555; margin-bottom: 15px; }

        /* --- Sizes --- */
        .detail-label { font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; color: #aaa; text-transform: uppercase; }
        .sizes { display: flex; gap: 5px; margin-bottom: 15px; }
        .size-btn {
            border: 1px solid #ddd; background: #fff; padding: 6px 10px;
            cursor: pointer; font-size: 0.75rem; flex: 1;
        }
        .size-btn.selected { background: #000; color: #fff; border-color: #000; }

        /* --- Button & Status --- */
        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .status-msg { font-size: 0.75rem; margin-top: 10px; text-align: center; height: 15px; font-weight: bold; }

        footer { text-align: center; padding: 40px; font-size: 0.75rem; color: #aaa; border-top: 1px solid #eee; margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="/" style="color: #fff; text-decoration: none;">SEASONING SOUL</a></div>
        <ul class="nav-menu">
            <li><a href="/mens">MEN'S</a></li>
            <li><a href="/womens">WOMEN'S</a></li>
            <li><a href="/kids">KIDS</a></li>
            <li><a href="/about">ABOUT</a></li>
        </ul>
        <a href="/checkout" class="cart-icon">🛒<span id="cart-badge" class="cart-badge">0</span></a>
    </nav>

    <main class="content-container">
        <h1 style="margin-bottom: 30px;">KIDS COLLECTION</h1>
        
        <div class="products-grid">
            
            <div class="product-card" data-id="kids-b-001">
                <div class="product-image">BOYS<br>LIGHT BLUE TEE</div>
                <div class="category-label">Boys</div>
                <div class="product-name">Essential T-Shirt</div>
                <div class="product-price">$20</div>

                <div class="detail-label">Select Size</div>
                <div class="sizes">
                    <button class="size-btn">S</button>
                    <button class="size-btn">M</button>
                    <button class="size-btn">L</button>
                </div>

                <button class="add-to-cart-btn">Add to Cart</button>
                <div class="status-msg"></div>
            </div>

            <div class="product-card" data-id="kids-g-001">
                <div class="product-image">GIRLS<br>LIGHT BLUE TEE</div>
                <div class="category-label">Girls</div>
                <div class="product-name">Essential T-Shirt</div>
                <div class="product-price">$20</div>

                <div class="detail-label">Select Size</div>
                <div class="sizes">
                    <button class="size-btn">S</button>
                    <button class="size-btn">M</button>
                    <button class="size-btn">L</button>
                </div>

                <button class="add-to-cart-btn">Add to Cart</button>
                <div class="status-msg"></div>
            </div>

            </div>
    </main>

    <footer>
        <p>&copy; Seasoning Soul 2026 | Created by Jamison Boykin | EST. 2026</p>
    </footer>

    <script>
        document.querySelectorAll('.product-card').forEach(card => {
            const sizeBtns = card.querySelectorAll('.size-btn');
            const addBtn = card.querySelector('.add-to-cart-btn');
            const statusMsg = card.querySelector('.status-msg');
            let selectedSize = null;

            sizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sizeBtns.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedSize = btn.innerText;
                    statusMsg.innerText = ""; 
                });
            });

            addBtn.addEventListener('click', () => {
                if (!selectedSize) {
                    statusMsg.style.color = "#d9534f";
                    statusMsg.innerText = "Select a size";
                    return;
                }

                const item = {
                    id: card.dataset.id,
                    name: card.querySelector('.product-name').innerText,
                    category: card.querySelector('.category-label').innerText,
                    size: selectedSize,
                    price: 20
                };

                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                cart.push(item);
                localStorage.setItem('cart', JSON.stringify(cart));

                updateBadge();
                statusMsg.style.color = "#28a745";
                statusMsg.innerText = "Added!";
                
                setTimeout(() => { statusMsg.innerText = ""; }, 2000);
            });
        });

        function updateBadge() {
            const badge = document.getElementById('cart-badge');
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length > 0) {
                badge.style.display = "block";
                badge.innerText = cart.length;
            }
        }
        updateBadge();
    </script>
</body>
</html>
