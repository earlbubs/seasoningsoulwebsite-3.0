<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Collection - Seasoning Soul</title>
    <style>
        /* --- Base Branding --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        /* Adjusted for closer menu items */
        .navbar {
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            padding: 15px 5%;
            background-color: #000;
            color: #fff;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
            margin-left: 60px; /* Controls distance from logo */
        }

        .nav-menu a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        .cart-icon { margin-left: auto; position: relative; text-decoration: none; color: #fff; }
        
        .cart-badge {
            position: absolute; top: -8px; right: -10px;
            background: #e33; color: #fff; border-radius: 50%;
            padding: 2px 6px; font-size: 0.7rem; display: none;
        }

        /* --- Grid System --- */
        .content-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 25px;
        }

        @media (max-width: 900px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .products-grid { grid-template-columns: 1fr; } }

        /* --- Product Card --- */
        .product-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-image {
            width: 100%;
            height: 280px;
            background-color: #87CEEB; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .category-label { font-size: 0.7rem; color: #999; text-transform: uppercase; margin-bottom: 5px; }
        .product-name { font-size: 1rem; font-weight: bold; margin-bottom: 5px; }
        .product-price { font-size: 1rem; color: #555; margin-bottom: 15px; }

        /* --- Selectors --- */
        .detail-label { font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; color: #aaa; text-transform: uppercase; }
        
        .selector-group { margin-bottom: 15px; }

        .sizes { display: flex; gap: 5px; }
        .size-btn {
            border: 1px solid #ddd; background: #fff; padding: 6px 10px;
            cursor: pointer; font-size: 0.75rem; flex: 1;
        }
        .size-btn.selected { background: #000; color: #fff; border-color: #000; }

        /* Quantity Input Style */
        .quantity-input {
            width: 60px;
            padding: 8px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            text-align: center;
        }

        .colors { display: flex; align-items: center; gap: 10px; }
        .color-swatch {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer; transition: 0.2s;
        }
        .color-swatch.selected { border-color: #333; transform: scale(1.1); }
        .color-name { font-size: 0.8rem; color: #666; }

        /* --- Button & Status --- */
        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .status-msg { font-size: 0.75rem; margin-top: 10px; text-align: center; height: 15px; font-weight: bold; }

        footer { text-align: center; padding: 40px; font-size: 0.75rem; color: #aaa; border-top: 1px solid #eee; margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="/" style="color: #fff; text-decoration: none;">SEASONING SOUL</a></div>
        <ul class="nav-menu">
            <li><a href="/mens">MEN'S</a></li>
            <li><a href="/womens">WOMEN'S</a></li>
            <li><a href="/kids">KIDS</a></li>
            <li><a href="/about">ABOUT</a></li>
        </ul>
        <a href="/checkout" class="cart-icon">🛒<span id="cart-badge" class="cart-badge">0</span></a>
    </nav>

    <main class="content-container">
        <h1 style="margin-bottom: 30px;">KIDS COLLECTION</h1>
        
        <div class="products-grid">
            
            <div class="product-card" data-id="kids-b-001">
                <div class="product-image">BOYS<br>LIGHT BLUE TEE</div>
                <div class="category-label">Boys</div>
                <div class="product-name">Essential T-Shirt</div>
                <div class="product-price">$20</div>

                <div class="selector-group">
                    <div class="detail-label">Color</div>
                    <div class="colors">
                        <div class="color-swatch selected" style="background-color: #87CEEB;" data-color="Light Blue"></div>
                        <span class="color-name">Light Blue</span>
                    </div>
                </div>

                <div class="selector-group">
                    <div class="detail-label">Size</div>
                    <div class="sizes">
                        <button class="size-btn">6-7</button>
                        <button class="size-btn">8-9</button>
                        <button class="size-btn">10-11</button>
                        <button class="size-btn">12-13</button>
                    </div>
                </div>

                <div class="selector-group">
                    <div class="detail-label">Quantity</div>
                    <input type="number" class="quantity-input" value="1" min="1">
                </div>

                <button class="add-to-cart-btn">Add to Cart</button>
                <div class="status-msg"></div>
            </div>

            <div class="product-card" data-id="kids-g-001">
                <div class="product-image">GIRLS<br>LIGHT BLUE TEE</div>
                <div class="category-label">Girls</div>
                <div class="product-name">Essential T-Shirt</div>
                <div class="product-price">$20</div>

                <div class="selector-group">
                    <div class="detail-label">Color</div>
                    <div class="colors">
                        <div class="color-swatch selected" style="background-color: #87CEEB;" data-color="Light Blue"></div>
                        <span class="color-name">Light Blue</span>
                    </div>
                </div>

                <div class="selector-group">
                    <div class="detail-label">Size</div>
                    <div class="sizes">
                        <button class="size-btn">6-7</button>
                        <button class="size-btn">8-9</button>
                        <button class="size-btn">10-11</button>
                        <button class="size-btn">12-13</button>
                    </div>
                </div>

                <div class="selector-group">
                    <div class="detail-label">Quantity</div>
                    <input type="number" class="quantity-input" value="1" min="1">
                </div>

                <button class="add-to-cart-btn">Add to Cart</button>
                <div class="status-msg"></div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; Seasoning Soul 2026 | Created by Jamison Boykin | EST. 2026</p>
    </footer>

    <script>
        document.querySelectorAll('.product-card').forEach(card => {
            const sizeBtns = card.querySelectorAll('.size-btn');
            const addBtn = card.querySelector('.add-to-cart-btn');
            const statusMsg = card.querySelector('.status-msg');
            const colorName = card.querySelector('.color-name').innerText;
            const quantityInput = card.querySelector('.quantity-input');
            let selectedSize = null;

            sizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sizeBtns.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedSize = btn.innerText;
                    statusMsg.innerText = ""; 
                });
            });

            addBtn.addEventListener('click', () => {
                if (!selectedSize) {
                    statusMsg.style.color = "#d9534f";
                    statusMsg.innerText = "Select a size";
                    return;
                }

                const qty = parseInt(quantityInput.value) || 1;

                const item = {
                    id: card.dataset.id,
                    name: card.querySelector('.product-name').innerText,
                    color: colorName,
                    size: selectedSize,
                    price: 20,
                    quantity: qty
                };

                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                
                // Add new item or update existing
                const existingIndex = cart.findIndex(i => i.id === item.id && i.size === item.size);
                if (existingIndex > -1) {
                    cart[existingIndex].quantity += qty;
                } else {
                    cart.push(item);
                }

                localStorage.setItem('cart', JSON.stringify(cart));

                updateBadge();
                statusMsg.style.color = "#28a745";
                statusMsg.innerText = `Added ${qty} to Cart!`;
                
                setTimeout(() => { statusMsg.innerText = ""; }, 2000);
            });
        });

        function updateBadge() {
            const badge = document.getElementById('cart-badge');
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((total, item) => total + (item.quantity || 1), 0);
            
            if (totalItems > 0) {
                badge.style.display = "block";
                badge.innerText = totalItems;
            } else {
                badge.style.display = "none";
            }
        }
        updateBadge();
    </script>
</body>
</html>
