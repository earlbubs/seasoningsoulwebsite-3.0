<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 md:p-12">

    <div class="max-w-md mx-auto bg-white p-8 border border-gray-200 rounded-lg shadow-sm">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-semibold">Sign In</h2>
            <p class="text-gray-500 text-sm mt-2">Enter your details to access your account</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" placeholder="email@example.com" required 
                    class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium text-gray-700">Password</label>
                    <a href="#" class="text-xs text-blue-600 hover:underline">Forgot password?</a>
                </div>
                <input type="password" placeholder="••••••••" required 
                    class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="remember" class="ml-2 text-sm text-gray-600">Remember me</label>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md transition duration-200">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-gray-600 text-sm">
                Don't have an account? 
                <a href="checkout.html" class="text-blue-600 font-semibold hover:underline ml-1">Create one</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Typically, you'd handle authentication logic here
            alert("Logging in...");
        });
    </script>
</body>
</html>
