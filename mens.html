<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Men's - Seasoning Soul</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo"><a href="/" style="color: #fff; text-decoration: none;">SEASONING SOUL</a></div>
        </div>
        <ul class="nav-menu">
            <li><a href="/mens">MEN'S</a></li>
            <li><a href="/womens">WOMEN'S</a></li>
            <li><a href="/kids">KIDS</a></li>
            <li><a href="/about">ABOUT</a></li>
        </ul>
        <div class="cart-icon">
            <a href="/checkout">🛒</a>
        </div>
    </nav>

    <!-- Canvas for screensaver -->
    <canvas id="logoCanvas"></canvas>

    <main>
        <div class="content">
            <h1>MEN'S COLLECTION</h1>
            
            <div class="products-grid">
                <div class="product-card">
                    <div class="product-images">
                        <div class="shirt-showcase">
                            <div class="shirt-front">
                                <div class="product-image">Front Design</div>
                            </div>
                            <div class="shirt-back">
                                <div class="product-image">Back Design</div>
                            </div>
                        </div>
                    </div>
                    <div class="product-name">Seasoning Soul T-Shirt</div>
                    <div class="product-price">$20</div>
                    
                    <div class="product-details-section">
                        <div class="detail-group">
                            <div class="detail-label">Sizes</div>
                            <div class="sizes">
                                <button class="size-btn">S</button>
                                <button class="size-btn">M</button>
                                <button class="size-btn">L</button>
                                <button class="size-btn">XL</button>
                            </div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Colors</div>
                            <div class="colors">
                                <div class="color-circle" style="background-color: #87CEEB;"></div>
                                <span class="color-label">Light Blue</span>
                            </div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Fabric type</div>
                            <div class="fabric-info">
                                <div class="fabric-item">
                                    <div class="fabric-type">100% cotton</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Copyright Seasoning Soul 2026</p>
        <p>Website created by Jamison Boykin.</p>
        <p>Locally Owned and Operated by Earl Twigg. EST. 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
  <!-- Advanced Cart JS -->
    <script>
        // Globals (can extend to use product id, color, price, etc)
        let selectedSize = null;
        let selectedColor = "#87CEEB";
        // Expand to multiple colors: just add more spans with color-circle class, and handle clicks

        // Size button select logic
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedSize = btn.getAttribute('data-size');
                document.getElementById('add-to-cart-error').style.display = 'none';
            });
        });

        // Color select logic (expand for more colors)
        document.querySelectorAll('.color-circle').forEach(circle => {
            circle.addEventListener('click', function() {
                document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
                circle.classList.add('selected');
                selectedColor = circle.getAttribute('data-color');
            });
        });

        function getCart() {
            try { return JSON.parse(localStorage.getItem('cart')) || []; }
            catch { return []; }
        }
        function setCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
        }
        function updateCartBadge() {
            const badge = document.getElementById('cart-badge');
            const cart = getCart();
            if (cart.length > 0) {
                badge.textContent = cart.length;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }

        // On Add to Cart
        document.getElementById('addToCartBtn').addEventListener('click', function() {
            const errorMsg = document.getElementById('add-to-cart-error');
            const addedMsg = document.getElementById('add-to-cart-message');
            if (!selectedSize) {
                errorMsg.textContent = "Please select a size!";
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';

            // Gather data for product
            const card = document.querySelector('.product-card');
            const productId = card.getAttribute('data-product-id');
            const productName = card.querySelector('.product-name').innerText;
            const priceStr = card.querySelector('.product-price').innerText.replace('$','');
            const price = parseFloat(priceStr);
            const colorLabel = card.querySelector('.color-circle.selected + .color-label').innerText;

            // Add to cart (check if already in cart with same details, optionally increase qty)
            let cart = getCart();
            // Check for same product/size/color in cart
            let existing = cart.find(item =>
                item.productId === productId &&
                item.size === selectedSize &&
                item.color === selectedColor
            );
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({
                    productId, productName,
                    size: selectedSize, color: selectedColor,
                    colorLabel,
                    price, qty: 1
                });
            }
            setCart(cart);

            // Feedback
            addedMsg.style.display = 'block';
            setTimeout(() => {
                addedMsg.style.display = 'none';
            }, 1500);
        });

        // On page load, update badge and restore selected if desired
        updateCartBadge();
    </script>
</body>
</html>
