<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's - Seasoning Soul</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #000;
            color: #fff;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Product Layout */
        main {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .product-card {
            background: #fff;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .product-image {
            background: #eee;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            font-weight: bold;
            color: #888;
            border-radius: 4px;
        }

        .product-name {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 30px;
        }

        /* Interaction Details */
        .detail-group {
            margin-bottom: 25px;
        }

        .detail-label {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: #999;
        }

        .sizes {
            display: flex;
            gap: 10px;
        }

        .size-btn {
            padding: 10px 20px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .size-btn:hover {
            border-color: #000;
        }

        .size-btn.selected {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #ddd;
        }

        /* Add to Cart Button */
        .add-to-cart-btn {
            width: 100%;
            padding: 20px;
            background-color: #000;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .add-to-cart-btn:hover {
            background-color: #333;
        }

        .add-to-cart-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="/" style="color: #fff; text-decoration: none;">SEASONING SOUL</a></div>
        <ul class="nav-menu">
            <li><a href="/mens">MEN'S</a></li>
            <li><a href="/womens">WOMEN'S</a></li>
            <li><a href="/kids">KIDS</a></li>
            <li><a href="/about">ABOUT</a></li>
        </ul>
        <div class="cart-icon">
            <a href="/checkout" style="text-decoration:none;">🛒 <span id="cart-count">0</span></a>
        </div>
    </nav>

    <main>
        <h1>MEN'S COLLECTION</h1>
        
        <div class="product-card">
            <div class="product-images">
                <div class="shirt-showcase">
                    <div class="product-image">100% Cotton Front</div>
                </div>
            </div>

            <div class="product-info">
                <div class="product-name">Seasoning Soul T-Shirt</div>
                <div class="product-price">$20</div>

                <div class="product-details-section">
                    <div class="detail-group">
                        <div class="detail-label">Select Size</div>
                        <div class="sizes">
                            <button class="size-btn">S</button>
                            <button class="size-btn">M</button>
                            <button class="size-btn">L</button>
                            <button class="size-btn">XL</button>
                        </div>
                    </div>

                    <div class="detail-group">
                        <div class="detail-label">Color</div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="color-circle" style="background-color: #87CEEB;"></div>
                            <span>Light Blue</span>
                        </div>
                    </div>

                    <div class="detail-group">
                        <div class="detail-label">Fabric</div>
                        <div>100% Cotton</div>
                    </div>

                    <button id="add-to-cart-btn" class="add-to-cart-btn">ADD TO CART</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Copyright Seasoning Soul 2026</p>
        <p>Website created by Jamison Boykin.</p>
        <p>Locally Owned and Operated by Earl Twigg. EST. 2026</p>
    </footer>

    <script>
        // 1. Selection Logic
        const sizeButtons = document.querySelectorAll('.size-btn');
        const addToCartBtn = document.getElementById('add-to-cart-btn');
        const cartCountDisplay = document.getElementById('cart-count');
        let selectedSize = null;

        sizeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                sizeButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedSize = btn.innerText;
            });
        });

        // 2. Add to Cart Logic
        addToCartBtn.addEventListener('click', () => {
            if (!selectedSize) {
                alert('Please select a size!');
                return;
            }

            // Create Item Object
            const item = {
                name: "Seasoning Soul T-Shirt",
                size: selectedSize,
                price: 20,
                fabric: "100% Cotton"
            };

            // Save to LocalStorage
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push(item);
            localStorage.setItem('cart', JSON.stringify(cart));

            // Visual Feedback
            updateCartCount();
            addToCartBtn.innerText = "ADDED TO CART!";
            addToCartBtn.style.backgroundColor = "#28a745";
            
            setTimeout(() => {
                addToCartBtn.innerText = "ADD TO CART";
                addToCartBtn.style.backgroundColor = "#000";
            }, 1500);
        });

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cartCountDisplay.innerText = cart.length;
        }

        // Initialize count on load
        updateCartCount();
    </script>
</body>
</html>
