<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Create Account & Shipping</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 md:p-12">

    <div class="max-w-xl mx-auto bg-white p-8 border border-gray-200 rounded-lg shadow-sm">
        <h2 class="text-2xl font-semibold mb-6">Complete Purchase</h2>

        <form id="checkoutForm" class="space-y-4">
            
            <div class="mb-8">
                <h3 class="text-lg font-medium mb-3 text-gray-700">1. Create Account</h3>
                <div class="space-y-3">
                    <input type="email" placeholder="Email address" required 
                        class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="password" placeholder="Create password" required 
                        class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <hr class="border-gray-200 my-6">

            <div>
                <h3 class="text-lg font-medium mb-3 text-gray-700">2. Shipping Address</h3>
                
                <div class="grid grid-cols-1 gap-4">
                    <div class="relative">
                        <label class="absolute text-xs text-gray-500 left-3 top-1">Country/region</label>
                        <select class="w-full pt-5 pb-2 px-3 border border-gray-300 rounded bg-white">
                            <option>United States</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="First name" required 
                            class="p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" placeholder="Last name" required 
                            class="p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <input type="text" placeholder="Address" required 
                        class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" placeholder="Apartment, suite, etc (optional)" 
                        class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">

                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" placeholder="City" required 
                            class="p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        
                        <div class="relative">
                            <label class="absolute text-xs text-gray-500 left-3 top-1">State</label>
                            <select id="stateSelect" required 
                                class="w-full pt-5 pb-2 px-3 border border-gray-300 rounded bg-white appearance-none">
                                </select>
                        </div>

                        <input type="text" placeholder="ZIP code" required 
                            class="p-3 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="flex border border-gray-300 rounded overflow-hidden">
                        <input type="tel" placeholder="Phone" value="+1" required 
                            class="flex-1 p-3 outline-none">
                        <div class="flex items-center px-3 border-l bg-gray-50">
                            <span class="text-xl">🇺🇸</span>
                        </div>
                    </div>

                    <div class="flex items-center space-x-2 py-2">
                        <input type="checkbox" id="default" class="w-4 h-4 rounded border-gray-300">
                        <label for="default" class="text-sm text-gray-700">This is my default address</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-md transition duration-200 mt-4">
                Complete Purchase
            </button>
        </form>
    </div>

    <script>
        // Array of 50 US States
        const states = [
            "Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", 
            "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", 
            "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", 
            "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", 
            "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", 
            "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", 
            "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"
        ];

        // Populate the dropdown
        const stateSelect = document.getElementById('stateSelect');
        states.forEach(state => {
            const option = document.createElement('option');
            option.value = state;
            option.textContent = state;
            stateSelect.appendChild(option);
        });

        // Form Submit Logic
        document.getElementById('checkoutForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Account created and order processed!");
        });
    </script>
</body>
</html>
