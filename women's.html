<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Women's - Seasoning Soul</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo"><a href="/" style="color: #fff; text-decoration: none;">SEASONING SOUL</a></div>
        </div>
        <ul class="nav-menu">
            <li><a href="/mens">MEN'S</a></li>
            <li><a href="/womens">WOMEN'S</a></li>
            <li><a href="/kids">KIDS</a></li>
            <li><a href="/about">ABOUT</a></li>
        </ul>
        <div class="cart-icon">
            <a href="/checkout">🛒</a>
        </div>
    </nav>

    <!-- Canvas for screensaver -->
    <canvas id="logoCanvas"></canvas>

    <main>
        <div class="content">
            <h1>WOMEN'S COLLECTION</h1>
            
            <div class="products-grid">
                <div class="product-card">
                    <div class="product-images">
                        <div class="shirt-showcase">
                            <div class="shirt-front">
                                <div class="product-image">Front Design</div>
                            </div>
                            <div class="shirt-back">
                                <div class="product-image">Back Design</div>
                            </div>
                        </div>
                    </div>
                    <div class="product-name">Seasoning Soul T-Shirt</div>
                    <div class="product-price">$20</div>
                    
                    <div class="product-details-section">
                        <div class="detail-group">
                            <div class="detail-label">Sizes</div>
                            <div class="sizes">
                                <button class="size-btn">S</button>
                                <button class="size-btn">M</button>
                                <button class="size-btn">L</button>
                                <button class="size-btn">XL</button>
                            </div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Colors</div>
                            <div class="colors">
                                <div class="color-circle" style="background-color: #87CEEB;"></div>
                                <span class="color-label">Light Blue</span>
                            </div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Fabric type</div>
                            <div class="fabric-info">
                                <div class="fabric-item">
                                    <div class="fabric-type">100% cotton</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Copyright Seasoning Soul 2026</p>
        <p>Website created by Jamison Boykin.</p>
        <p>Locally Owned and Operated by Earl Twigg. EST. 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
