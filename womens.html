<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's - Seasoning Soul</title>
    <style>
        /* --- Base Styles & Layout --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: #000;
            color: #fff;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-menu a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        .cart-icon { position: relative; text-decoration: none; }
        .cart-badge {
            position: absolute; top: -8px; right: -10px;
            background: #e33; color: #fff; border-radius: 50%;
            padding: 2px 6px; font-size: 0.7rem; display: none;
        }

        /* --- Grid System --- */
        .content-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* --- Product Card Styles --- */
        .product-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .product-image-placeholder {
            width: 100%;
            height: 300px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #999;
            margin-bottom: 15px;
            font-size: 0.8rem;
            text-align: center;
        }

        .product-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .product-price { font-size: 1rem; color: #666; margin-bottom: 15px; }

        /* --- Selectors --- */
